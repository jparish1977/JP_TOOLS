# JP_TOOLS shared ruff configuration
# Applied when running: ruff check --config /path/to/this/ruff.toml <target>
# Or copy/symlink into a project as ruff.toml

line-length = 100
target-version = "py38"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line too long — handled by formatter, not linter
    "B008",   # do not perform function calls in default arguments (common in Tkinter/UI)
    "SIM108", # ternary operator — sometimes less readable
    "UP007",  # use X | Y for union types — requires Python 3.10+
]

[lint.per-file-ignores]
"*_test.py"  = ["S101"]  # allow assert in tests
"test_*.py"  = ["S101"]
"**/tests/*" = ["S101"]

[format]
quote-style = "double"
indent-style = "space"
