name: Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python:
    name: Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff mypy
      - name: Self-check Python files
        run: |
          for f in check.py fix.py install-hooks.py init-ci.py; do
            echo "--- $f ---"
            python check.py "$f" --pretty
          done

  js:
    name: JS (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - name: Self-check JS files
        run: |
          for f in jp_eslint.mjs jp_stylelint.mjs; do
            echo "--- $f ---"
            python check.py "$f" --pretty
          done
